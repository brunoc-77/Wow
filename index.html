<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Uma pergunta para você</title>
<style>
  /* ============================================================
     TOKENS — paleta, tipografia e variáveis globais
     ============================================================ */
  :root{
    --black:        #07030a;
    --maroon-deep:  #210308;
    --crimson:      #6e0b22;
    --scarlet:      #ff2d4f;
    --rose-mist:    #f6dfe2;
    --rose-dim:     #c98e96;

    --font-display: Georgia, 'Times New Roman', 'Iowan Old Style', serif;
    --font-ui:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

    --ease-soft: cubic-bezier(.22,.61,.36,1);
    --ease-out:  cubic-bezier(.16,1,.3,1);
  }

  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--black);
    color: var(--rose-mist);
    font-family: var(--font-ui);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    position: fixed;
    inset: 0;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ============================================================
     CAMADA DE FUNDO — gradiente cinematográfico + zoom lento
     ============================================================ */
  .bg-layer{
    position:absolute; inset:-6%;
    background:
      radial-gradient(circle at 50% 28%, rgba(255,45,79,.16), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(110,11,34,.35), transparent 55%),
      radial-gradient(circle at 15% 85%, rgba(110,11,34,.25), transparent 50%),
      linear-gradient(160deg, var(--black) 0%, var(--maroon-deep) 55%, var(--black) 100%);
    animation: bg-breathe 26s ease-in-out infinite alternate;
    z-index:0;
  }
  @keyframes bg-breathe{
    0%   { transform: scale(1) rotate(0deg); filter: brightness(1); }
    100% { transform: scale(1.06) rotate(.4deg); filter: brightness(1.08); }
  }

  /* vinheta cinematográfica */
  .vignette{
    position:absolute; inset:0; z-index:5; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.92) 100%);
    transition: opacity 1.4s ease;
  }

  /* textura de grão de filme (SVG ruído embutido, sem libs externas) */
  .grain{
    position:absolute; inset:0; z-index:6; pointer-events:none;
    opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 160px 160px;
  }

  /* ============================================================
     PARTÍCULAS AMBIENTE (poeira flutuante, todas as cenas)
     ============================================================ */
  .ambient-particles{ position:absolute; inset:0; z-index:1; overflow:hidden; pointer-events:none; }
  .dust{
    position:absolute; bottom:-5%;
    width: var(--ds); height: var(--ds);
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,180,190,.9), rgba(255,45,79,0) 70%);
    opacity:0;
    animation: dust-rise var(--dd) linear infinite;
    animation-delay: var(--dl);
  }
  @keyframes dust-rise{
    0%   { transform: translate(0,0); opacity:0; }
    8%   { opacity: var(--do); }
    50%  { transform: translate(var(--dx), -55vh); }
    92%  { opacity: var(--do); }
    100% { transform: translate(0, -112vh); opacity:0; }
  }

  /* ============================================================
     LAYOUT DE CENAS
     ============================================================ */
  .scene{
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 6vh 6vw;
    opacity:0; visibility:hidden; pointer-events:none;
    transform: translateY(14px) scale(.985);
    transition: opacity 1.15s var(--ease-soft), transform 1.15s var(--ease-soft), visibility 1.15s;
  }
  .scene.active{
    opacity:1; visibility:visible; pointer-events:auto;
    transform: translateY(0) scale(1);
  }

  .eyebrow{
    font-family: var(--font-ui);
    font-size: .68rem;
    letter-spacing: .32em;
    text-transform: uppercase;
    color: var(--rose-dim);
    opacity:.75;
    margin-bottom: 1.6rem;
  }

  .question{
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(2rem, 7vw, 3.6rem);
    line-height: 1.15;
    margin: 0 0 3.2rem;
    color: var(--rose-mist);
    text-shadow:
      0 0 18px rgba(255,45,79,.45),
      0 0 46px rgba(255,45,79,.22);
    letter-spacing: .01em;
  }

  /* ============================================================
     PALCO DOS BOTÕES
     ============================================================ */
  .button-stage{
    position:relative;
    width: min(92vw, 460px);
    height: 130px;
  }
  .btn{
    position:absolute;
    top:50%;
    border:1px solid rgba(255,150,170,.35);
    border-radius: 999px;
    padding: .95rem 2.1rem;
    font-family: var(--font-ui);
    font-size: .92rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    cursor:pointer;
    background: linear-gradient(160deg, rgba(40,4,10,.85), rgba(15,1,4,.9));
    color: var(--rose-mist);
    box-shadow: 0 6px 24px rgba(0,0,0,.5), 0 0 0 rgba(255,45,79,0);
    transition: box-shadow .35s ease, background .35s ease, border-color .35s ease,
                left .5s var(--ease-out), top .5s var(--ease-out);
    white-space: nowrap;
    user-select:none;
    -webkit-user-select:none;
  }
  .btn:hover{
    border-color: rgba(255,90,120,.7);
    box-shadow: 0 8px 30px rgba(0,0,0,.55), 0 0 26px rgba(255,45,79,.35);
  }
  .btn:focus-visible{
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,45,79,.55), 0 8px 30px rgba(0,0,0,.55);
  }
  .btn:active{ transform: translate(-50%,-50%) scale(.96); }

  .btn-sim{ left: 30%; transform: translate(-50%,-50%); }
  .btn-nao{ left: 70%; transform: translate(-50%,-50%); }

  /* quando o "Não" começa a fugir, passa a ser posicionado pelo JS em viewport fixo */
  .btn-nao.fled{
    position: fixed;
    transform: none;
    transition: left .5s var(--ease-out), top .5s var(--ease-out), box-shadow .35s ease;
  }
  .btn-nao.caught{
    opacity:.45;
    cursor:default;
    pointer-events:none;
    filter: grayscale(.3);
  }

  /* contador discreto */
  .attempt-counter{
    margin-top: 2.2rem;
    font-size: .68rem;
    letter-spacing: .25em;
    text-transform:uppercase;
    color: var(--rose-dim);
    opacity:.55;
  }

  /* botão "Próxima pergunta" */
  .btn-next{
    margin-top: 2.6rem;
    opacity:0;
    transform: translateY(18px);
    pointer-events:none;
    transition: opacity 1s var(--ease-soft), transform 1s var(--ease-soft);
  }
  .btn-next.show{
    opacity:1;
    transform: translateY(0);
    pointer-events:auto;
  }
  .btn-next button{
    border:1px solid rgba(255,90,120,.55);
    background: linear-gradient(160deg, rgba(110,11,34,.55), rgba(20,2,6,.85));
    color: var(--rose-mist);
    padding: .95rem 2.4rem;
    border-radius:999px;
    font-family: var(--font-ui);
    font-size:.85rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow: 0 0 28px rgba(255,45,79,.25);
    transition: box-shadow .35s ease, transform .25s ease;
  }
  .btn-next button:hover{ box-shadow: 0 0 40px rgba(255,45,79,.45); transform: translateY(-2px); }

  /* frase dramática da segunda pergunta */
  .think-line{
    position:absolute;
    top: -3.2rem;
    left:50%;
    transform: translate(-50%, 6px);
    font-family: var(--font-display);
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--scarlet);
    letter-spacing:.12em;
    opacity:0;
    text-shadow: 0 0 18px rgba(255,45,79,.55);
    transition: opacity 1.6s var(--ease-soft), transform 1.6s var(--ease-soft);
    white-space:nowrap;
  }
  .think-line.show{ opacity:.92; transform: translate(-50%, 0); }
  .think-line.pulse{ animation: think-pulse .7s ease; }
  @keyframes think-pulse{
    0%,100%{ text-shadow: 0 0 18px rgba(255,45,79,.55); }
    50%{ text-shadow: 0 0 34px rgba(255,45,79,.9); }
  }

  #scene-2 .button-stage{ margin-top: 3.4rem; }

  /* ============================================================
     FINALE — espetáculo cinematográfico
     ============================================================ */
  #finale{ z-index: 20; }
  #finale .vignette-finale{
    position:absolute; inset:0; z-index:11; pointer-events:none;
    background: radial-gradient(circle at 50% 60%, rgba(255,45,79,.18), transparent 55%),
                rgba(0,0,0,0);
    opacity:0;
    transition: opacity 2.4s ease;
  }
  #finale.active .vignette-finale{ opacity:1; }

  .hearts-field{
    position:absolute; inset:0; z-index:12; overflow:hidden; pointer-events:none;
  }
  .heart-particle{
    position:absolute; bottom:0; left:0;
    will-change: transform, opacity;
    animation-name: heart-rise;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }
  .heart-particle .heart{
    width: var(--s); height: var(--s);
    position:relative;
    filter: drop-shadow(0 0 calc(var(--s) * .4) var(--glow));
  }
  .heart-particle .heart::before,
  .heart-particle .heart::after{
    content:""; position:absolute; top:0;
    width: calc(var(--s) * .52);
    height: calc(var(--s) * .8);
    border-radius: calc(var(--s) * .5) calc(var(--s) * .5) 0 0;
    background: var(--fill);
  }
  .heart-particle .heart::before{ left: calc(var(--s) * .5); transform: rotate(-45deg); transform-origin: 0 100%; }
  .heart-particle .heart::after{  left: 0;                    transform: rotate(45deg);  transform-origin: 100% 100%; }

  @keyframes heart-rise{
    0%   { transform: translate(0,0) scale(var(--sc)); opacity:0; }
    8%   { opacity: var(--op); }
    32%  { transform: translate(var(--dx1), -34vh) scale(var(--sc)); }
    64%  { transform: translate(var(--dx2), -68vh) scale(var(--sc)); }
    90%  { opacity: var(--op); }
    100% { transform: translate(0, -116vh) scale(var(--sc)); opacity:0; }
  }

  .finale-copy{
    position:relative; z-index:15;
    display:flex; flex-direction:column; align-items:center;
    opacity:0;
    transform: translateY(10px) scale(.97);
    transition: opacity 2.2s var(--ease-soft) .3s, transform 2.2s var(--ease-soft) .3s;
  }
  #finale.active .finale-copy{ opacity:1; transform: translateY(0) scale(1); }

  .finale-title{
    font-family: var(--font-display);
    font-style: italic;
    font-weight:400;
    font-size: clamp(2.6rem, 11vw, 6.4rem);
    line-height:1;
    margin:0;
    color: var(--rose-mist);
    text-shadow:
      0 0 24px rgba(255,45,79,.65),
      0 0 70px rgba(255,45,79,.4),
      0 0 130px rgba(255,45,79,.25);
    animation: title-glow 5s ease-in-out infinite;
  }
  @keyframes title-glow{
    0%,100%{ text-shadow: 0 0 24px rgba(255,45,79,.55), 0 0 70px rgba(255,45,79,.35), 0 0 130px rgba(255,45,79,.2); }
    50%{ text-shadow: 0 0 34px rgba(255,45,79,.85), 0 0 90px rgba(255,45,79,.55), 0 0 160px rgba(255,45,79,.35); }
  }

  .finale-sub{
    margin: 1.6rem 0 0;
    font-family: var(--font-ui);
    font-size: clamp(.95rem, 2.4vw, 1.25rem);
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--rose-dim);
    opacity:0;
    transform: translateY(8px);
    transition: opacity 1.8s var(--ease-soft) 1.6s, transform 1.8s var(--ease-soft) 1.6s;
  }
  #finale.active .finale-sub{ opacity:.9; transform: translateY(0); }

  /* ============================================================
     RESPONSIVIDADE
     ============================================================ */
  @media (max-width: 480px){
    .btn{ padding:.85rem 1.5rem; font-size:.8rem; }
    .button-stage{ height: 110px; }
    .btn-sim{ left:26%; } .btn-nao{ left:74%; }
    .think-line{ top:-3.6rem; }
  }

  /* ============================================================
     MOVIMENTO REDUZIDO
     ============================================================ */
  @media (prefers-reduced-motion: reduce){
    .bg-layer, .dust, .heart-particle, .finale-title{ animation: none !important; }
    .scene, .btn-next, .think-line, .finale-copy, .finale-sub{ transition-duration: .2s !important; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="bg-layer"></div>
  <div class="ambient-particles" id="ambient"></div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- ===================== CENA 1 ===================== -->
  <section class="scene active" id="scene-1">
    <p class="eyebrow">uma pergunta rápida</p>
    <h1 class="question">Você é macaca?</h1>

    <div class="button-stage" id="stage-1">
      <button class="btn btn-sim" id="sim-1">Sim</button>
      <button class="btn btn-nao" id="nao-1">Não</button>
    </div>

    <p class="attempt-counter" id="counter-1">tentativa 0 de 5</p>

    <div class="btn-next" id="next-1">
      <button id="btn-proxima">Próxima pergunta</button>
    </div>
  </section>

  <!-- ===================== CENA 2 ===================== -->
  <section class="scene" id="scene-2">
    <p class="eyebrow">agora, com calma</p>
    <h1 class="question">Você me ama?</h1>

    <div class="button-stage" id="stage-2">
      <span class="think-line" id="think-line">Pense bem...</span>
      <button class="btn btn-sim" id="sim-2">Sim</button>
      <button class="btn btn-nao" id="nao-2">Não</button>
    </div>
  </section>

  <!-- ===================== FINALE ===================== -->
  <section class="scene" id="finale">
    <div class="vignette-finale"></div>
    <div class="hearts-field" id="hearts-field"></div>
    <div class="finale-copy">
      <h1 class="finale-title">Eu amo você</h1>
      <p class="finale-sub">Bruno ama você também</p>
    </div>
  </section>
</div>

<script>
(function(){
  "use strict";

  /* ----------------------------------------------------------
     Utilitários
     ---------------------------------------------------------- */
  const rand  = (min, max) => Math.random() * (max - min) + min;
  const isSmall = window.innerWidth < 560;

  function rectsOverlap(a, b, margin){
    return !(a.right + margin < b.left || a.left - margin > b.right ||
             a.bottom + margin < b.top || a.top - margin > b.bottom);
  }

  /* ----------------------------------------------------------
     Partículas ambiente (poeira flutuante de fundo)
     ---------------------------------------------------------- */
  function spawnAmbientDust(container, count){
    for (let i = 0; i < count; i++){
      const d = document.createElement('div');
      d.className = 'dust';
      d.style.left = rand(2, 97) + '%';
      d.style.setProperty('--ds', rand(2, 5).toFixed(1) + 'px');
      d.style.setProperty('--dd', rand(14, 30).toFixed(1) + 's');
      d.style.setProperty('--dl', (-rand(0, 28)).toFixed(1) + 's');
      d.style.setProperty('--dx', rand(-30, 30).toFixed(0) + 'px');
      d.style.setProperty('--do', rand(.25, .65).toFixed(2));
      container.appendChild(d);
    }
  }
  spawnAmbientDust(document.getElementById('ambient'), isSmall ? 22 : 42);

  /* ----------------------------------------------------------
     Lógica do botão fujão
     ---------------------------------------------------------- */
  function fleeButton(btn, otherBtn){
    const margin = 28;
    const padding = 18;
    const w = btn.offsetWidth, h = btn.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    const otherRect = otherBtn.getBoundingClientRect();

    let x, y, tries = 0, candidate;
    do {
      x = padding + Math.random() * Math.max(1, (vw - w - padding * 2));
      y = padding + Math.random() * Math.max(1, (vh - h - padding * 2));
      candidate = { left: x, top: y, right: x + w, bottom: y + h };
      tries++;
    } while (rectsOverlap(candidate, otherRect, margin) && tries < 50);

    btn.classList.add('fled');
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';
  }

  /* ----------------------------------------------------------
     Navegação entre cenas
     ---------------------------------------------------------- */
  function goTo(sceneEl){
    document.querySelectorAll('.scene').forEach(s => {
      s.classList.remove('active');
      s.setAttribute('aria-hidden', 'true');
    });
    sceneEl.classList.add('active');
    sceneEl.setAttribute('aria-hidden', 'false');
  }

  const scene1 = document.getElementById('scene-1');
  const scene2 = document.getElementById('scene-2');
  const finale = document.getElementById('finale');

  /* ----------------------------------------------------------
     Cena 1 — "Você é macaca?"
     ---------------------------------------------------------- */
  const sim1   = document.getElementById('sim-1');
  const nao1   = document.getElementById('nao-1');
  const counter1 = document.getElementById('counter-1');
  const next1  = document.getElementById('next-1');
  const MAX_ATTEMPTS = 5;
  let attempts1 = 0;

  nao1.addEventListener('click', () => {
    if (attempts1 >= MAX_ATTEMPTS) return;
    attempts1++;
    counter1.textContent = `tentativa ${attempts1} de ${MAX_ATTEMPTS}`;
    fleeButton(nao1, sim1);

    if (attempts1 >= MAX_ATTEMPTS){
      nao1.classList.add('caught');
      setTimeout(() => next1.classList.add('show'), 350);
    }
  });

  sim1.addEventListener('click', () => goTo(scene2));
  document.getElementById('btn-proxima').addEventListener('click', () => goTo(scene2));

  /* ----------------------------------------------------------
     Cena 2 — "Você me ama?"
     ---------------------------------------------------------- */
  const sim2 = document.getElementById('sim-2');
  const nao2 = document.getElementById('nao-2');
  const thinkLine = document.getElementById('think-line');
  let thinkShown = false;

  nao2.addEventListener('click', () => {
    fleeButton(nao2, sim2);
    if (!thinkShown){
      thinkShown = true;
      thinkLine.classList.add('show');
    } else {
      thinkLine.classList.add('pulse');
      setTimeout(() => thinkLine.classList.remove('pulse'), 700);
    }
  });

  sim2.addEventListener('click', startFinale);

  /* ----------------------------------------------------------
     Finale — espetáculo de corações
     ---------------------------------------------------------- */
  function spawnHearts(container, count){
    const fills = ['#ff2d4f', '#c4123a', '#8b0020', '#ff6b85', '#e8536e'];
    for (let i = 0; i < count; i++){
      const wrap = document.createElement('div');
      wrap.className = 'heart-particle';

      const size = rand(14, 42);
      const duration = rand(9, 19);
      const delay = -rand(0, duration);
      const fill = fills[Math.floor(Math.random() * fills.length)];

      wrap.style.left = rand(1, 97) + '%';
      wrap.style.setProperty('--s', size.toFixed(1) + 'px');
      wrap.style.setProperty('--sc', rand(.75, 1.3).toFixed(2));
      wrap.style.setProperty('--op', rand(.4, .92).toFixed(2));
      wrap.style.setProperty('--dx1', rand(-44, 44).toFixed(0) + 'px');
      wrap.style.setProperty('--dx2', rand(-44, 44).toFixed(0) + 'px');
      wrap.style.setProperty('--fill', fill);
      wrap.style.setProperty('--glow', fill + 'aa');
      wrap.style.animationDuration = duration.toFixed(1) + 's';
      wrap.style.animationDelay = delay.toFixed(1) + 's';

      const inner = document.createElement('div');
      inner.className = 'heart';
      wrap.appendChild(inner);
      container.appendChild(wrap);
    }
  }

  let finaleStarted = false;
  function startFinale(){
    if (finaleStarted) return;
    finaleStarted = true;
    spawnHearts(document.getElementById('hearts-field'), isSmall ? 70 : 130);
    goTo(finale);
  }

})();
</script>
</body>
</html>
